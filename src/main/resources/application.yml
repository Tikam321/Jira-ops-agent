
spring:
  application:
    name: jira-ops-agent

  datasource:
    url: jdbc:postgresql://localhost:5432/jira_ops
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

jira:
  base-url: ${JIRA_BASE_URL}
  email: ${JIRA_EMAIL}
  api-token: ${JIRA_API_TOKEN}

gemini:
  api-key: ${GEMINI_API_KEY}

groq:
  api-key: ${GROQ_API_KEY}

server:
  port: 8081

logging:
  level:
    com.jiraops: DEBUG
    com.jiraops.agent.service.GroqService: DEBUG
    com.jiraops.agent.service.JiraApiService: DEBUG
    com.jiraops.agent.service.NaturalLanguageService: DEBUG
    org.springframework.web: INFO
    org.springframework.web.reactive: DEBUG
    reactor.netty: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
