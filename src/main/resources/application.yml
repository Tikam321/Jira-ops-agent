
spring:
  application:
    name: jira-ops-agent

  datasource:
    url: jdbc:postgresql://localhost:5432/jira_ops
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

jira:
  base-url: ${JIRA_BASE_URL}
  email: ${JIRA_EMAIL}
  api-token: ${JIRA_API_TOKEN}

gemini:
  api-key: ${GEMINI_API_KEY}

groq:
  api-key: ${GROQ_API_KEY}

server:
  port: 8081

logging:
  level:
    com.jiraops: DEBUG
    org.springframework.web: INFO
